spring.application.name=fishing-api
spring.profiles.default=dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/fishing_api}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fishing}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fishing}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.flyway.enabled=true

# LOGGING
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{20} | %msg%n

# Naver
naver.api.base-url=https://maps.apigw.ntruss.com
naver.api.key-id=${NAVER_API_KEY_ID}
naver.api.key=${NAVER_API_KEY}

# Kakao
kakao.api.rest-key=${KAKAO_API_REST_KEY:}

# OpenWeatherMap
openweather.api.base-url=https://api.openweathermap.org
openweather.api.key=${OPENWEATHER_API_KEY}

# GPT
openai.base-url: https://api.openai.com/v1
openai.api-key: ${OPENAI_API_KEY}
openai.model: gpt-5.4

# OpenSearch
opensearch.base-url=${OPENSEARCH_BASE_URL:http://localhost:9200}
opensearch.index-name=${OPENSEARCH_INDEX_NAME:fishing_articles_v1}
opensearch.community-index-name=${OPENSEARCH_COMMUNITY_INDEX_NAME:fishing_community_v1}

# PHOTO_SIZE
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# community storage
community.storage.local-root=${COMMUNITY_STORAGE_LOCAL_ROOT:${user.dir}/uploads}
community.storage.public-base-path=${COMMUNITY_STORAGE_PUBLIC_BASE_PATH:/uploads}

# S3 Storage (prod only)
storage.type=${STORAGE_TYPE:local}
storage.s3.bucket=${STORAGE_S3_BUCKET:fishing-media}
storage.s3.region=${STORAGE_S3_REGION:ap-northeast-2}

# auth
auth.jwt.issuer=${AUTH_JWT_ISSUER:fishing-api}
auth.jwt.secret=${AUTH_JWT_SECRET:dev-secret-key-change-me-dev-secret-key-change-me}
auth.jwt.access-token-expiration-seconds=${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:1800}
auth.jwt.refresh-token-expiration-seconds=${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
auth.kakao.authorize-url=${AUTH_KAKAO_AUTHORIZE_URL:https://kauth.kakao.com/oauth/authorize}
auth.kakao.token-url=${AUTH_KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}
auth.kakao.user-info-url=${AUTH_KAKAO_USER_INFO_URL:https://kapi.kakao.com/v2/user/me}
auth.kakao.client-id=${AUTH_KAKAO_CLIENT_ID:}
auth.kakao.client-secret=${AUTH_KAKAO_CLIENT_SECRET:}
auth.kakao.redirect-uri=${AUTH_KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}
auth.kakao.scope=${AUTH_KAKAO_SCOPE:}
auth.google.authorize-url=${AUTH_GOOGLE_AUTHORIZE_URL:https://accounts.google.com/o/oauth2/v2/auth}
auth.google.token-url=${AUTH_GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
auth.google.user-info-url=${AUTH_GOOGLE_USER_INFO_URL:https://www.googleapis.com/oauth2/v3/userinfo}
auth.google.client-id=${AUTH_GOOGLE_CLIENT_ID:}
auth.google.client-secret=${AUTH_GOOGLE_CLIENT_SECRET:}
auth.google.redirect-uri=${AUTH_GOOGLE_REDIRECT_URI:http://localhost:5173/auth/google/callback}
auth.google.scope=${AUTH_GOOGLE_SCOPE:openid email profile}
auth.refresh-cookie.name=${AUTH_REFRESH_COOKIE_NAME:refresh_token}
auth.refresh-cookie.path=${AUTH_REFRESH_COOKIE_PATH:/}
auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}

# actuator endpoint
management.endpoints.web.exposure.include=health,info,prometheus
